name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp check

  lint:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run lint

  typecheck:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run typecheck

  test-unit:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp test --project unit

  test-browser:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - uses: useblacksmith/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: vp exec playwright install --with-deps chromium
      - run: vp test --project browser

  build:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run build

  size:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run size

  # --- PR previews (not part of the required gate) ---------------------

  musea-preview:
    if: github.event_name == 'pull_request'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run musea:build
      # The gallery shell hardcodes /__musea__ URLs; rebase them onto the
      # preview subpath or every asset and API fetch 404s.
      - run: node tools/musea-subpath.mjs "/vue-calenadar-temporal/pr/${{ github.event.number }}"
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-musea
          destination_dir: pr/${{ github.event.number }}
      - name: Comment the gallery link
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
        run: |
          URL="https://ubugeeei-prod.github.io/vue-calenadar-temporal/pr/${PR}/__musea__/"
          BODY="📅 **Musea gallery preview**: ${URL} (updated for $(git rev-parse --short HEAD))"
          gh pr comment "$PR" --edit-last --body "$BODY" || gh pr comment "$PR" --body "$BODY"

  gallery-main:
    if: github.event_name == 'push'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run musea:build
      - run: node tools/musea-subpath.mjs "/vue-calenadar-temporal"
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-musea
          destination_dir: .
          keep_files: true

  pkg-pr-new:
    if: github.event_name == 'pull_request'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run build
      - run: vp dlx pkg-pr-new publish --compact

  # Aggregate gate: the only required status check. Job-level changes above
  # never require touching the branch ruleset.
  ci:
    needs: [check, lint, typecheck, test-unit, test-browser, build, size]
    if: always()
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - name: Verify every job succeeded
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "results: $RESULTS"
          for result in $RESULTS; do
            [ "$result" = "success" ] || exit 1
          done
